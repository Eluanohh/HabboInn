<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Verificar Disponibilidade</title>

    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main>
      <h1>Verificar Disponibilidade</h1>

      <div class="filtros">
        <input type="date" id="checkin" required />

        <input type="date" id="checkout" required />

        <input
          type="number"
          id="pessoas"
          placeholder="Quantidade de pessoas"
          min="1"
          max="6"
          required
        />

        <button id="buscar">Verificar disponibilidade</button>
      </div>

      <div class="container-quartos" id="container-quartos"></div>

      <button class="btn botao-1" onclick="window.location.href = 'index.html'">
        Voltar
      </button>
    </main>

    <script>
      const buscar = document.getElementById("buscar");

      buscar.addEventListener("click", async () => {
        const checkin = document.getElementById("checkin").value;
        const checkout = document.getElementById("checkout").value;
        const pessoas = document.getElementById("pessoas").value;

        if (!checkin || !checkout || !pessoas) {
          alert("Preencha todos os campos.");
          return;
        }

        try {
          const resposta = await fetch(
            "http://localhost:3031/rooms/disponiveis",
            {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
              },
              body: JSON.stringify({
                checkin,
                checkout,
                pessoas,
              }),
            },
          );

          const quartos = await resposta.json();

          const container = document.getElementById("container-quartos");

          container.innerHTML = "";

          if (quartos.length === 0) {
            container.innerHTML =
              "<h2>Nenhum quarto disponível para esse período.</h2>";
            return;
          }

          quartos.forEach((quarto) => {
            container.innerHTML += `

                <div class="caixa">

                    <img src="https://i0.wp.com/blog.brisahoteis.com.br/wp-content/uploads/2024/09/Brisa-Janeiro-2020-KAIO-FRAGOSO-19-Grande.jpeg?resize=1024%2C684&ssl=1" alt="Quarto">

                    <h2>${quarto.nome_quarto}</h2>

                    <p><strong>Tipo:</strong> ${quarto.tipo}</p>

                    <p><strong>Capacidade:</strong> ${quarto.capacidade} pessoas</p>

                    <p><strong>Preço:</strong> ${quarto.preco_cambios} câmbios</p>

                    <p><strong>Avaliação:</strong> ⭐ ${quarto.avaliacao}</p>

                    <button onclick="reservar(${quarto.id_quarto})">
                        Reservar
                    </button>

                </div>

            `;
          });
        } catch (erro) {
          console.log(erro);
          alert("Erro ao buscar quartos.");
        }
      });

      function reservar(idQuarto) {
        alert("Quarto " + idQuarto + " selecionado!");

        // Aqui depois você fará o POST para criar a reserva
      }
    </script>
  </body>
</html>
