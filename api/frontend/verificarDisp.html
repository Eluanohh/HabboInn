<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quartos Disponíveis</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/quartos.css">
</head>

<body>

    <header>
        <h1>Habboinn</h1>
        <p>Verifique os quartos disponíveis</p>
    </header>

    <main>

        <div class="filtros">

            <input type="date" id="checkin" required>

            <input type="date" id="checkout" required>

            <input
                type="number"
                id="pessoas"
                min="1"
                max="6"
                placeholder="Quantidade de pessoas"
                required>

            <button id="buscar">
                Verificar disponibilidade
            </button>

        </div>

        <div class="container-quartos" id="container-quartos">

        </div>

        <button
            class="btn botao-1"
            onclick="window.location.href='index.html'">

            Voltar

        </button>

    </main>

    <script src="js/verificarDisp.js"></script>

</body>

</html>
