<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/login.css">

</head>

<body>

    <div class="login-box">

        <div class="logo-login">
            <img src="imagens/logo.png" alt="Habbo Inn">
        </div>

        <h2>Entrar</h2>

        <input
            type="email"
            id="email"
            placeholder="E-mail">

        <input
            type="password"
            id="senha"
            placeholder="Senha">

        <button id="btnLogin">

            Entrar

        </button>

        <p>

            Ainda não possui conta?

            <a href="cadastro.html">

                Cadastre-se

            </a>

        </p>

        <button
            class="btn botao-1"
            onclick="window.location.href='index.html'">

            Voltar

        </button>

    </div>

    <script src="js/login.js"></script>

<script src="login.js"></script>

</body>

</html>
