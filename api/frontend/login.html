<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Login - HabboInn</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="login-box">
    <h2>Login</h2>

    <input
        type="email"
        id="email"
        placeholder="E-mail">

    <input
        type="password"
        id="senha"
        placeholder="Senha">

    <button onclick="login()">
        Entrar
    </button>

    <p id="mensagem"></p>

</div>

<script src="login.js"></script>

</body>
</html>
