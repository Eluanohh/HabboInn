<!DOCTYPE html>

<html lang="pt-br">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cadastro</title>

<link rel="stylesheet" href="css/style.css">

<link rel="stylesheet" href="css/login.css">

</head>

<body>

<div class="login-box">

<h2>Criar Conta</h2>

<input
type="text"
id="nome"
placeholder="Nome">

<input
type="email"
id="email"
placeholder="E-mail">

<input
type="password"
id="senha"
placeholder="Senha">

<button id="btnCadastro">

Cadastrar

</button>

<p>

Já possui conta?

<a href="login.html">

Entrar

</a>

</p>

<button
            class="btn botao-1"
            onclick="window.location.href='index.html'">

            Voltar

        </button>

</div>

<script src="js/cadastro.js"></script>

</body>

</html>
